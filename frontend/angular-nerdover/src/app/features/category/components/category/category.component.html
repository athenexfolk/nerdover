<app-item-card>
  <div class="flex flex-col gap-1">
    <span class="font-medium">{{ category().name }}</span>
    <span class="text-xs">{{ category().slug }}</span>
  </div>
  <div class="flex items-center gap-2">
    <app-edit-item-button (trigger)="triggerUpdate.emit(category())" />
    <app-delete-item-button (trigger)="triggerDelete.emit(category())" />
  </div>
</app-item-card>
