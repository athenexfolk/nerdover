<app-overlay>
  <app-overlay-card title="เพิ่มบทเรียน">
    <form [formGroup]="form" (ngSubmit)="create()" class="flex flex-col gap-2">
      <div class="flex flex-col gap-1">
        <label for="slug" class="text-sm">หมุดบทเรียน</label>
        <input
          type="text"
          id="slug"
          formControlName="slug"
          class="w-full rounded border border-stone-300 px-4 py-2"
        />
      </div>
      <div class="flex flex-col gap-1">
        <label for="title" class="text-sm">ชื่อบทเรียน</label>
        <input
          type="text"
          id="title"
          formControlName="title"
          class="w-full rounded border border-stone-300 px-4 py-2"
        />
      </div>
      <div>
        <label for="categorySlug" class="text-sm">หมวดหมู่</label>
        <select
          id="categorySlug"
          formControlName="categorySlug"
          class="w-full appearance-none rounded border border-stone-300 px-4 py-2"
        >
          @for (category of categories; track $index) {
            <option [value]="category.slug">{{ category.name }}</option>
          }
        </select>
      </div>
      <div class="flex flex-col gap-1">
        <label for="cover" class="text-sm">ภาพปก</label>
        <input
          id="cover"
          class="hidden"
          type="file"
          accept="image/*"
          #coverImageInput
        />
        <button
          (click)="coverImageInput.click()"
          type="button"
          class="flex aspect-video flex-col items-center justify-center gap-2 rounded border border-stone-300"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="1.5"
            stroke="currentColor"
            class="size-6"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m2.25 15.75 5.159-5.159a2.25 2.25 0 0 1 3.182 0l5.159 5.159m-1.5-1.5 1.409-1.409a2.25 2.25 0 0 1 3.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 0 0 1.5-1.5V6a1.5 1.5 0 0 0-1.5-1.5H3.75A1.5 1.5 0 0 0 2.25 6v12a1.5 1.5 0 0 0 1.5 1.5Zm10.5-11.25h.008v.008h-.008V8.25Zm.375 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z"
            />
          </svg>
          อัปโหลด
        </button>
      </div>
      <div class="grid grid-cols-2 place-items-center">
        <button
          class="rounded-full px-4 py-2 font-medium text-green-700 hover:bg-green-50"
        >
          เพิ่ม
        </button>
        <button
          type="button"
          (click)="closed.emit()"
          class="rounded-full px-4 py-2 font-medium hover:bg-stone-50"
        >
          ยกเลิก
        </button>
      </div>
    </form>
  </app-overlay-card>
</app-overlay>
