<div class="bg-gray-50 h-screen flex p-2 justify-center items-center">
  <div class="flex flex-col gap-4 w-72 rounded-xl bg-white p-4 shadow-md">
    <div class="p-4">
      <img
        src="assets/images/logo/logo.svg"
        alt="logo"
        class="w-12 h-12 mx-auto"
      />
    </div>
    <div class="px-4 py-2 flex gap-4 rounded-lg bg-gray-100">
      <span class="material-symbols-rounded"> person </span>
      <input
        type="text"
        placeholder="ชื่อผู้ใช้"
        [(ngModel)]="username"
        class="outline-0 bg-transparent"
      />
    </div>
    <div class="px-4 py-2 flex gap-4 rounded-lg bg-gray-100">
      <span class="material-symbols-rounded"> lock </span>
      <input
        type="password"
        placeholder="รหัสผ่าน"
        [(ngModel)]="password"
        class="outline-0 bg-transparent"
      />
    </div>
    <button (click)="login()"
      class="px-4 py-2 rounded-lg bg-blue-500 hover:bg-blue-700 text-white font-semibold mt-4"
    >
      เข้าสู่ระบบ
    </button>
  </div>
</div>
