<app-item-card>
  <div class="flex flex-col gap-1">
    <span class="font-medium">{{ lesson().title }}</span>
    <span class="text-xs">{{ lesson().slug }}</span>
  </div>
  <div class="flex items-end gap-2">
    <app-edit-item-button (trigger)="triggerUpdate.emit(lesson())" />
    <app-content-item-button (trigger)="triggerContent.emit(lesson())" />
    <app-delete-item-button (trigger)="triggerDelete.emit(lesson())" />
  </div>
</app-item-card>
